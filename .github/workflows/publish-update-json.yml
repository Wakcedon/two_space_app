name: Publish update.json on release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: rel
        uses: actions/github-script@v6
        with:
          script: |
            const release = context.payload.release;
            const tag = release.tag_name || release.name || '';
            const notes = release.body || '';
            let asset_url = '';
            if (release.assets && release.assets.length > 0) {
              asset_url = release.assets[0].browser_download_url;
            }
            core.setOutput('version', tag.replace(/^v/, '')); // remove leading v
            core.setOutput('notes', notes);
            core.setOutput('asset_url', asset_url);

      - name: Checkout gh-pages (or create)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          persist-credentials: true
          fetch-depth: 0
          # if gh-pages doesn't exist this will still checkout default branch,
          # we'll create/update gh-pages below.

      - name: Create update.json
        run: |
          mkdir -p out
          cat > out/update.json <<EOF
          {
            "version": "${{ steps.rel.outputs.version }}",
            "update_url": "${{ steps.rel.outputs.asset_url }}",
            "notes": "${{ steps.rel.outputs.notes | toJson | fromJson }}"
          }
          EOF
      - name: Commit to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create gh-pages branch if missing
          if ! git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout --orphan gh-pages
            git rm -rf .
            mkdir -p out
            git add out/update.json
            git commit -m "chore(publish): create gh-pages with update.json"
            git push -u origin gh-pages --force
          else
            git checkout gh-pages
            mkdir -p .
            mv out/update.json update.json
            git add update.json
            git commit -m "chore(publish): update update.json for ${{ steps.rel.outputs.version }}" || true
            git push origin gh-pages
          fi
