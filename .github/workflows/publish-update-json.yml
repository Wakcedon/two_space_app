name: Publish update.json on release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create update.json from release
        env:
          RELEASE_JSON: ${{ toJson(github.event.release) }}
        run: |
          python - <<'PY'
          import json, os
          release = json.loads(os.environ['RELEASE_JSON'])
          tag = release.get('tag_name') or release.get('name') or ''
          version = tag.lstrip('v')
          notes = release.get('body') or ''
          asset_url = ''
          assets = release.get('assets') or []
          if assets:
            asset = assets[0]
            asset_url = asset.get('browser_download_url') or ''
          data = {
            'version': version,
            'update_url': asset_url,
            'notes': notes
          }
          with open('update.json', 'w', encoding='utf-8') as f:
            json.dump(data, f, ensure_ascii=False, indent=2)
          print('Wrote update.json:')
          print(json.dumps(data, ensure_ascii=False))
          PY

      - name: Commit and push to gh-pages
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # If gh-pages exists remotely, fetch and switch to it; otherwise create orphan
          if git ls-remote --exit-code origin gh-pages; then
            git fetch origin gh-pages:gh-pages
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi
          # Ensure update.json is in repo root
          mv -f update.json update.json || true
          git add update.json
          git commit -m "chore(publish): update update.json for ${RELEASE_TAG}" || echo "No changes to commit"
          git push origin gh-pages --force
