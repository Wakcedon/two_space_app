name: Publish update.json on release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch release via GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          RELEASE_ID=${{ github.event.release.id }}
          OWNER=${{ github.repository_owner }}
          REPO=${{ github.event.repository.name }}
          echo "Fetching release ${RELEASE_ID} for ${OWNER}/${REPO}"
          curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" "https://api.github.com/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}" -o release.json
          echo "Saved release.json"

      - name: Create update.json from fetched release
        run: |
          mkdir -p out
          python - <<'PY'
          import json, os
          with open('release.json', 'r', encoding='utf-8') as f:
            release = json.load(f)
          tag = release.get('tag_name') or release.get('name') or ''
          version = tag.lstrip('v')
          notes = release.get('body') or ''
          asset_url = ''
          assets = release.get('assets') or []
          for asset in assets:
            if asset.get('browser_download_url'):
              asset_url = asset.get('browser_download_url')
              break
          data = {
            'version': version,
            'update_url': asset_url,
            'notes': notes
          }
          out_path = os.path.join('out', 'update.json')
          with open(out_path, 'w', encoding='utf-8') as f:
            json.dump(data, f, ensure_ascii=False, indent=2)
          print('Wrote', out_path)
          print(json.dumps(data, ensure_ascii=False))
          PY

      - name: Commit and push to gh-pages (safe temp clone)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          set -e
          # repo URL for authenticated push
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${OWNER}/${REPO}.git"
          # ensure no leftover file in workspace that could block branch checkouts
          rm -f update.json || true
          rm -rf gh-pages-temp
          # If gh-pages exists remotely, clone it shallowly and update
          if git ls-remote --exit-code origin gh-pages; then
            echo "gh-pages exists — cloning into gh-pages-temp"
            git clone --depth 1 --branch gh-pages "${REPO_URL}" gh-pages-temp
            # remove old file in temp clone to avoid any overwrite conflicts, then copy
            rm -f gh-pages-temp/update.json || true
            cp -f out/update.json gh-pages-temp/update.json
            cd gh-pages-temp
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add update.json
            git commit -m "chore(publish): update update.json for ${RELEASE_TAG}" || echo "No changes to commit"
            git push origin gh-pages
            cd ..
          else
            echo "gh-pages does not exist — creating branch via temporary clone"
            git clone "${REPO_URL}" gh-pages-temp
            cd gh-pages-temp
            git checkout --orphan gh-pages
            git rm -rf . || true
            mkdir -p .
            rm -f update.json || true
            cp -f ../out/update.json update.json
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add update.json
            git commit -m "chore(publish): create gh-pages with update.json for ${RELEASE_TAG}"
            git push origin gh-pages
            cd ..
          fi
